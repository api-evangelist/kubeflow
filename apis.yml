aid: kubeflow
name: Kubeflow
description: >-
  Kubeflow is an open-source machine learning platform for Kubernetes, designed
  to make deployments of ML workflows on Kubernetes simple, portable, and
  scalable. It provides tools for training, serving, and managing ML models.
type: Index
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:
  - Machine Learning
  - MLOps
  - Kubernetes
  - AI
  - Deep Learning
  - Model Training
  - Model Serving
  - Open Source
url: https://raw.githubusercontent.com/api-evangelist/kubeflow/refs/heads/main/apis.yml
created: '2024-01-15'
modified: '2026-03-16'
specificationVersion: '0.19'
apis:
  - aid: kubeflow:pipelines-api
    name: Kubeflow Pipelines API
    description: >-
      REST API for creating, managing, and executing machine learning pipelines
      on Kubernetes.
    humanURL: https://www.kubeflow.org/docs/components/pipelines/
    baseURL: https://your-kubeflow-instance/pipeline
    tags:
      - Machine Learning
      - Pipelines
      - Workflows
    properties:
      - type: Documentation
        url: https://www.kubeflow.org/docs/components/pipelines/v2/reference/api/kubeflow-pipeline-api-spec/
      - type: OpenAPI
        url: https://raw.githubusercontent.com/kubeflow/pipelines/master/backend/api/v2beta1/swagger/pipeline.swagger.json
  - aid: kubeflow:notebooks-api
